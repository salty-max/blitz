# Local Postgres for the API (auth sessions + saved teams).
# Copy apps/api/.env.example to apps/api/.env, then: docker compose up -d
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: blitz
      POSTGRES_PASSWORD: blitz
      POSTGRES_DB: blitz
    ports:
      - '5432:5432'
    volumes:
      - blitz-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U blitz -d blitz']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  blitz-postgres:
